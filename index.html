<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* Dark scrollbars */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #111; }
::-webkit-scrollbar-thumb { background: #333; }
::-webkit-scrollbar-thumb:hover { background: #444; }
html { scrollbar-color: #333 #111; }

:root {
    --bg: #001018;
    --bg-surface: #111;
    --bg-hover: #1a1a1a;
    --border: #333;
    --text: #ccc;
    --text-dim: #888;
    --text-bright: #fff;
    --accent: #7c9cff;
    --accent-dim: #5577cc;
    --green: #2ea06a;
    --red: #dc3545;
    --yellow: #d4a017;
    --orange: #e67700;
    --cyan: #22d3ee;
    --purple: #7c3aed;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.container { margin: 0 auto; padding: 16px; }

header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 0 12px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
    flex-wrap: wrap;
}

header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-bright);
    white-space: nowrap;
}

.search-box {
    flex: 1;
    min-width: 200px;
    max-width: 500px;
    position: relative;
}

.search-box input {
    width: 100%;
    padding: 6px 12px 6px 32px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    outline: none;
}

.search-box input:focus { border-color: var(--accent); }

.search-box::before {
    content: '\1F50D';
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    opacity: 0.5;
}

.stats-bar {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--text-dim);
    margin-left: auto;
}

.stats-bar span { white-space: nowrap; }
.stats-bar .value { color: var(--text-bright); font-weight: 600; }

/* Session List */
#session-list-view { display: block; }
#transcript-view { display: none; background: #001018; color: #ccc; margin: -16px; padding: 0; }

.table-wrap { overflow-x: auto; }

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

thead th {
    position: sticky;
    top: 0;
    background: var(--bg-surface);
    padding: 8px 10px;
    text-align: left;
    font-weight: 600;
    color: var(--text-dim);
    border-bottom: 2px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

thead th:hover { color: var(--text-bright); }
thead th.sorted-asc::after { content: ' \25B2'; color: var(--accent); }
thead th.sorted-desc::after { content: ' \25BC'; color: var(--accent); }

thead th.align-right, tbody td.align-right { text-align: right; }

tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
}

tbody tr:hover { background: var(--bg-hover); }

tbody td {
    padding: 7px 10px;
    vertical-align: top;
    max-width: 450px;
}


.col-summary-inner {
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    line-height: 1.4;
}

.col-tags { white-space: nowrap; font-size: 14px; padding: 0 2px; }
.col-time { white-space: nowrap; color: var(--text-dim); font-size: 12px; }
.col-duration { white-space: nowrap; font-variant-numeric: tabular-nums; }
.col-number { white-space: nowrap; font-variant-numeric: tabular-nums; text-align: right; }
.col-cost { white-space: nowrap; font-variant-numeric: tabular-nums; text-align: right; color: var(--yellow); }
.col-model { white-space: nowrap; font-size: 11px; color: var(--text-dim); }

/* Transcript View — terminal look */
.transcript-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 0;
    padding: 8px 16px;
    background: #111;
    border-bottom: 1px solid #222;
    flex-wrap: wrap;
}

.filters-bar .back-btn {
    padding: 2px 8px;
    background: #222;
    border: 1px solid #444;
    color: #ccc;
    cursor: pointer;
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

.filters-bar .back-btn:hover { background: #333; }

.transcript-meta {
    font-size: 12px;
    color: #888;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

.transcript-meta .label { color: #888; }
.transcript-meta .val { color: #ccc; }

.filters-bar {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 0;
    padding: 8px 16px;
    background: #111;
    border-bottom: 1px solid #222;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    position: sticky;
    top: 0;
    z-index: 20;
}
.filters-toggles {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}
#scroll-metrics {
    display: none;
    color: #777;
    gap: 10px;
    flex-wrap: wrap;
}
#scroll-metrics .val { color: #aaa; }

.transcript-search {
    display: flex;
    align-items: center;
    gap: 4px;
}
.transcript-search input {
    width: 150px;
    padding: 2px 6px;
    background: #000;
    border: 1px solid #333;
    color: #ccc;
    font-size: 12px;
    font-family: inherit;
    outline: none;
}
.transcript-search input:focus { border-color: #f88; }
#transcript-search-count {
    font-size: 11px;
    color: #777;
    min-width: 30px;
    display: none;
}
.transcript-search.active #transcript-search-count { display: inline; }
.transcript-search-nav { display: none; }
.transcript-search.active .transcript-search-nav { display: inline-flex; }
.transcript-search-nav button {
    background: none;
    border: 1px solid #333;
    color: #888;
    font-size: 11px;
    padding: 1px 5px;
    cursor: pointer;
    font-family: inherit;
}
.transcript-search-nav button:hover { color: #ccc; border-color: #555; }
mark.search-hit { background: #665500; color: #fff; border-radius: 2px; }
mark.search-hit.current { background: #f88; color: #000; }

.filters-bar label {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: #888;
    cursor: pointer;
    user-select: none;
}

.filters-bar input[type="checkbox"] { accent-color: #f88; }

.messages {
    display: flex;
    flex-direction: column;
    gap: 0;
    background: #001018;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px;
    line-height: 1.5;
    color: #e0e0e0;
    padding: 0;
    min-height: 100vh;
}

/* Terminal message blocks */
.term-block {
    border-bottom: 1px solid #111;
    padding: 0 0.5em 1em 0.5em;
}

.term-block.sidechain { opacity: 0.5; }

.term-content.expanded {
    max-height: none !important;
    overflow-y: auto !important;
}

/* User prompt */
.term-block.type-user {
    background: #222;
    font-size: 120%;
    padding-bottom: 0;
}

/* Sticky prompt mirror */
#sticky-prompt {
    position: fixed;
    left: 0;
    right: 0;
    z-index: 10;
    background: #222;
    font-size: 120%;
    padding: 0 0.5em;
    border-bottom: 1px solid #111;
    display: none;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    line-height: 1.5;
}

#sticky-prompt .term-prefix { color: #f88; font-weight: bold; }
#sticky-prompt .term-content { color: #fff; font-weight: bold; max-height: 4.5em; overflow: hidden; cursor: pointer; padding: 0 0.5rem; }
#sticky-prompt .term-content.expanded { max-height: none !important; overflow-y: auto !important; }
#sticky-prompt .term-nav { display: flex; justify-content: flex-end; gap: 12px; padding: 2px 0.5rem; font-size: 11px; }
#sticky-prompt .term-nav span { color: #555; cursor: pointer; user-select: none; }
#sticky-prompt .term-nav span:hover { color: #999; }
#sticky-prompt .term-nav span.hidden { display: none; }
#sticky-prompt .term-meta-line { text-align: right; padding: 0 0.5rem; font-size: 11px; }
#sticky-prompt .term-meta { display: inline-flex; gap: 8px; white-space: nowrap; }
#sticky-prompt .meta-model { color: #888; }
#sticky-prompt .meta-tokens { color: #777; }
#sticky-prompt .meta-time { color: #555; }

.term-block.type-user .term-prefix {
    color: #f88;
    font-weight: bold;
}

.user-icon {
    height: 1.4em;
    width: 1.4em;
    object-fit: cover;
    vertical-align: middle;
    border: 1px solid #000;
    border-radius: 100%;
}

.term-block.type-user .term-content {
    color: #fff;
    font-weight: bold;
    max-height: 4.5em;
    overflow: hidden;
    cursor: pointer;
}

.term-block.type-assistant {
    background: #112218;
    padding-bottom: 0;
}

.term-block.type-assistant .term-content {
    color: #e0e0e0;
}

.term-block.type-thinking .term-prefix {
    color: #555;
    font-style: italic;
}

.term-block.type-thinking .term-content {
    color: #555;
    font-style: italic;
    max-height: 400px;
    overflow: hidden;
    cursor: pointer;
}

.term-block.type-tool_use .term-prefix {
    color: #e67700;
}

.term-block.type-tool_use .term-content {
    color: #888;
    max-height: 300px;
    overflow: hidden;
    cursor: pointer;
}

/* Tool result */
.term-block.type-tool_result {
    background: #000;
}

.term-block.type-tool_result .term-prefix {
    color: #888;
}

.term-block.type-tool_result .term-content {
    color: #666;
    max-height: 300px;
    overflow: hidden;
    cursor: pointer;
}

/* System */
.term-block.type-system .term-content {
    color: #555;
    font-style: italic;
}

/* Special user subtypes */
.term-block.type-agent_notification .term-prefix { color: #555; }
.term-block.type-agent_notification .term-content { color: #666; }
.term-block.type-skill .term-prefix { color: #6f42c1; }
.term-block.type-skill .term-content { color: #888; }
.term-block.type-plan .term-prefix { color: #0d9488; }
.term-block.type-plan .term-content { color: #888; }
.term-block.type-interrupt .term-prefix { color: #dc3545; }
.term-block.type-interrupt .term-content { color: #dc3545; }
.term-block.type-continuation .term-prefix { color: #555; }
.term-block.type-continuation .term-content { color: #666; }

/* Summary */
.term-block.type-summary {
    padding: 8px 16px;
    background: #0a1a0a;
    border-left: 3px solid #198754;
}

.term-block.type-summary .term-prefix { color: #198754; font-weight: bold; }
.term-block.type-summary .term-content { color: #2ea06a; }

/* Content padding */
.term-content {
    padding: 0 0.5rem;
}

/* Navigation footer */
.term-nav {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    padding: 2px 0.5rem;
    font-size: 11px;
}

.term-nav span {
    color: #555;
    cursor: pointer;
    user-select: none;
}

.term-nav span:hover { color: #999; }
.term-nav span.hidden { display: none; }

/* Token/meta info — right-aligned line above content */
.term-meta-line {
    text-align: right;
    padding: 0 0.5rem;
    font-size: 11px;
}

.term-meta {
    display: inline-flex;
    gap: 8px;
    white-space: nowrap;
}

.term-meta .meta-model { color: #888; }
.term-meta .meta-tokens { color: #777; }
.term-meta .meta-time { color: #555; }
.term-meta .meta-sidechain { color: #e67700; }

/* Markdown inside terminal */
.term-md {
    word-break: break-word;
}

.term-md p { margin: 0.4em 0; }
.term-md p:first-child { margin-top: 0; }
.term-md p:last-child { margin-bottom: 0; }
.term-md pre { background: #111; padding: 8px 10px; overflow-x: auto; margin: 0.5em 0; border: 1px solid #222; }
.term-md code { background: #000; padding: 1px 4px; color: #CC8; }
.term-md pre code { background: none; padding: 0; }
.term-md ul, .term-md ol { margin: 0.4em 0; padding-left: 1.5em; }
.term-md h1, .term-md h2, .term-md h3, .term-md h4 { margin: 0.6em 0 0.3em; color: #fff; font-weight: bold; }
.term-md h1 { font-size: 1.3em; }
.term-md h2 { font-size: 1.15em; }
.term-md h3 { font-size: 1.05em; }
.term-md blockquote { border-left: 3px solid #222; padding-left: 10px; color: #888; margin: 0.4em 0; }
.term-md table { border-collapse: collapse; margin: 0.4em 0; }
.term-md th, .term-md td { border: 1px solid #222; padding: 4px 8px; }
.term-md a { color: #7c9cff; }
.term-md strong { color: #fff; }
.term-md img { max-width: 100%; }

.hidden { display: none !important; }

.loading {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
}

.error-msg {
    background: rgba(220, 53, 69, 0.15);
    border: 1px solid rgba(220, 53, 69, 0.4);
    color: var(--red);
    padding: 12px;
    margin: 16px 0;
}

.search-hint {
    font-size: 11px;
    color: var(--text-dim);
    padding: 4px 0;
}

.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
}
</style>

<body>
<div class="container">
    <header>
        <h1>Alexey Prompts</h1>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search all message content...">
        </div>
        <div class="stats-bar" id="stats-bar"></div>
    </header>

    <div id="session-list-view">
        <div class="table-wrap">
            <table id="session-table">
                <thead>
                    <tr>
                        <th data-col="summary">Summary</th>
                        <th data-col="tags"></th>
                        <th data-col="started">Started</th>
                        <th data-col="total_duration_sec" class="align-right">Duration</th>
                        <th data-col="api_duration_ms" class="align-right">API Time</th>
                        <th data-col="user_msgs" class="align-right">Prompts</th>
                        <th data-col="all_msgs" class="align-right">Msgs</th>

                        <th data-col="cost" class="align-right">Cost</th>
                        <th data-col="approved_count" class="align-right">Approved</th>
                        <th data-col="rejected_count" class="align-right">Rejected</th>
                        <th data-col="plan_count" class="align-right">Plans</th>
                        <th data-col="compaction_count" class="align-right">Compactions</th>
                        <th data-col="lines_added" class="align-right">Lines</th>
                        <th data-col="model">Model</th>
                    </tr>
                </thead>
                <tbody id="session-tbody"></tbody>
            </table>
        </div>
        <div id="list-loading" class="loading">Loading sessions...</div>
        <div id="list-error" class="error-msg hidden"></div>
    </div>

    <div id="transcript-view">
        <div class="transcript-header">
            <div class="transcript-meta" id="transcript-meta"></div>
        </div>
        <div class="filters-bar" id="filters-bar">
            <div class="filters-toggles">
                <button class="back-btn" id="back-btn">&larr;</button>
                <div class="transcript-search">
                    <input type="text" id="transcript-search-input" placeholder="Find in transcript...">
                    <span id="transcript-search-count"></span>
                    <span class="transcript-search-nav">
                        <button id="transcript-search-prev" title="Previous">&uarr;</button>
                        <button id="transcript-search-next" title="Next">&darr;</button>
                    </span>
                </div>
                <label><input type="checkbox" id="filter-all"> All</label>
                <label><input type="checkbox" id="filter-user" checked> User</label>
                <label><input type="checkbox" id="filter-assistant" checked> Agent</label>
                <label><input type="checkbox" id="filter-thinking" checked> Thinking</label>
                <label><input type="checkbox" id="filter-tools" checked> Tool calls</label>
                <label><input type="checkbox" id="filter-results" checked> Tool res</label>
                <label><input type="checkbox" id="filter-agent"> Agent notif</label>
                <label><input type="checkbox" id="filter-skill"> Skills</label>
                <label><input type="checkbox" id="filter-plan" checked> Plans</label>
                <label><input type="checkbox" id="filter-interrupt" checked> Interrupt</label>
                <label><input type="checkbox" id="filter-continuation"> Cont</label>
            </div>
            <div id="scroll-metrics"></div>
        </div>
        <div id="sticky-prompt"></div>
        <div class="messages" id="messages-container"></div>
        <div id="transcript-loading" class="hidden" style="text-align:center;padding:40px;color:#555">Loading transcript...</div>
        <div id="transcript-error" class="hidden" style="color:#dc3545;padding:12px 16px"></div>
    </div>
</div>

<script>
const ansiUp = new AnsiUp();

const CH_URL = 'http://localhost:8123/'
const CH_USER = 'default';
const CH_PASSWORD = '';

function chHeaders() {
    if (!CH_USER) return {};
    return { 'Authorization': 'Basic ' + btoa(CH_USER + ':' + CH_PASSWORD) };
}

// Model pricing per million tokens
const PRICING = {
    'opus-4.5+': { input: 5, output: 25, cache_read: 0.50, cache_creation: 6.25 },
    'opus-4.0':  { input: 15, output: 75, cache_read: 1.50, cache_creation: 18.75 },
    sonnet:      { input: 3, output: 15, cache_read: 0.30, cache_creation: 3.75 },
    haiku:       { input: 1, output: 5, cache_read: 0.10, cache_creation: 1.25 },
};

function detectPricingTier(model) {
    if (!model) return 'sonnet';
    const m = model.toLowerCase();
    if (m.includes('opus')) {
        // opus-4-5, opus-4-6 etc. are $5/$25; opus-4-0, opus-4-1, opus-4 (no minor) are $15/$75
        const ver = m.match(/opus-(\d+)-(\d+)/);
        if (ver && Number(ver[1]) >= 4 && Number(ver[2]) >= 5) return 'opus-4.5+';
        if (ver) return 'opus-4.0';
        return 'opus-4.5+'; // default for unversioned opus
    }
    if (m.includes('haiku')) return 'haiku';
    return 'sonnet';
}

function computeCost(row) {
    const tier = detectPricingTier(row.model);
    const p = PRICING[tier];
    return (
        (Number(row.input_tokens) || 0) * p.input +
        (Number(row.output_tokens) || 0) * p.output +
        (Number(row.cache_read_tokens) || 0) * p.cache_read +
        (Number(row.cache_creation_tokens) || 0) * p.cache_creation
    ) / 1_000_000;
}

async function queryClickHouse(sql) {
    const resp = await fetch(CH_URL, {
        method: 'POST',
        headers: chHeaders(),
        body: sql + '\nFORMAT JSON',
    });
    if (!resp.ok) {
        const text = await resp.text();
        throw new Error(`ClickHouse error ${resp.status}: ${text.slice(0, 500)}`);
    }
    const json = await resp.json();
    return json.data || [];
}

// --- State ---
let sessions = [];
let sortCol = 'started';
let sortDir = 'desc';
let sortByUser = false; // true when user clicked a column header during search
let searchText = '';
let fullTextSessionIds = null; // null = no full-text filter; Map session_id -> relevance rank (lower = better)
let transcriptData = null;

// --- Formatting helpers ---
function formatDuration(sec) {
    sec = Number(sec) || 0;
    if (sec < 60) return `${sec}s`;
    if (sec < 3600) return `${Math.floor(sec / 60)}m ${sec % 60}s`;
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    return `${h}h ${m}m`;
}

function formatMs(ms) {
    ms = Number(ms) || 0;
    const sec = Math.round(ms / 1000);
    return formatDuration(sec);
}

function formatNumber(n) {
    n = Number(n) || 0;
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
    if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
    return String(n);
}

function formatCost(c) {
    if (c < 0.01) return '$' + c.toFixed(4);
    if (c < 1) return '$' + c.toFixed(3);
    return '$' + c.toFixed(2);
}

function formatTime(ts) {
    if (!ts) return '';
    // ClickHouse returns "2026-02-13 22:56:12.795" (no timezone, local time)
    // Try parsing as-is first, then with T separator
    let d = new Date(ts);
    if (isNaN(d)) d = new Date(ts.replace(' ', 'T'));
    if (isNaN(d)) return ts;
    const now = new Date();
    const diff = now - d;
    const pad = n => String(n).padStart(2, '0');
    const time = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    if (diff < 86400000 && d.getDate() === now.getDate()) return `Today ${time}`;
    if (diff < 172800000) return `Yesterday ${time}`;
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${time}`;
}

function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// eslint-disable-next-line no-control-regex
const ANSI_RE = /\x1b\[/;
function renderAnsi(s) {
    if (!s) return '';
    if (ANSI_RE.test(s)) return ansiUp.ansi_to_html(s);
    return escapeHtml(s);
}

function shortModel(m) {
    if (!m) return '';
    // e.g. "claude-sonnet-4-5-20250514" -> "sonnet-4.5"
    const match = m.match(/claude-(\w+)-(\d+)-(\d+)/);
    if (match) return `${match[1]}-${match[2]}.${match[3]}`;
    return m.replace('claude-', '');
}

function getSummaryText(row) {
    if (row.summary) return row.summary;
    if (row.first_question) {
        const t = row.first_question;
        // Try to parse if it's JSON array (content blocks)
        if (t.startsWith('[')) {
            try {
                const blocks = JSON.parse(t);
                if (Array.isArray(blocks)) {
                    const texts = blocks.filter(b => b.type === 'text').map(b => b.text);
                    if (texts.length) return texts.join(' ').slice(0, 300);
                }
            } catch(e) {}
        }
        return t.slice(0, 300);
    }
    return '(no summary)';
}

// --- Plan+Implementation merging ---
const UUID_RE = /([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})\.jsonl/;
const PLAN_PREFIX = 'Implement the following plan:';

function mergePlanSessions() {
    const byId = new Map(sessions.map(s => [s.session_id, s]));
    const planIds = new Set(); // plan sessions to hide

    for (const s of sessions) {
        const raw = s.first_question || '';
        if (!raw.startsWith(PLAN_PREFIX)) continue;
        const match = raw.match(UUID_RE);
        if (!match) continue;
        const planId = match[1];
        const plan = byId.get(planId);
        if (!plan) continue;

        // Merge plan session into implementation session
        const numFields = ['user_msgs', 'assistant_msgs', 'all_msgs',
            'input_tokens', 'output_tokens', 'cache_read_tokens', 'cache_creation_tokens',
            'api_duration_ms', 'plan_count', 'compaction_count', 'approved_count', 'rejected_count',
            'lines_added', 'lines_removed'];
        for (const f of numFields) {
            s[f] = (Number(s[f]) || 0) + (Number(plan[f]) || 0);
        }

        // Use earlier start time, later end time
        if (plan.started && (!s.started || plan.started < s.started)) s.started = plan.started;
        if (plan.ended && (!s.ended || plan.ended > s.ended)) s.ended = plan.ended;

        // Recalculate duration from merged timestamps
        if (s.started && s.ended) {
            const start = new Date(s.started.replace(' ', 'T'));
            const end = new Date(s.ended.replace(' ', 'T'));
            if (!isNaN(start) && !isNaN(end)) {
                s.total_duration_sec = Math.round((end - start) / 1000);
            }
        }

        // Use plan session's first_question as summary (the original user intent)
        s.first_question = plan.first_question || s.first_question;
        if (plan.summary) s.summary = plan.summary;

        // Keep track of merged session IDs for transcript linking
        s._plan_session_id = planId;

        // Recalculate cost and total tokens
        s.cost = computeCost(s);
        s.total_tokens = (Number(s.input_tokens) || 0) + (Number(s.output_tokens) || 0) + (Number(s.cache_read_tokens) || 0) + (Number(s.cache_creation_tokens) || 0);

        planIds.add(planId);
    }

    // Remove plan sessions that were merged
    sessions = sessions.filter(s => !planIds.has(s.session_id));
}

async function loadLineStats() {
    const sql = `SELECT
    data.sessionId::String AS session_id,
    sumIf(
        countSubstrings(block.input.new_string::String, char(10)) + 1,
        block.type::String = 'tool_use' AND block.name::String = 'Edit' AND block.input.new_string::String != ''
    ) + sumIf(
        countSubstrings(block.input.content::String, char(10)) + 1,
        block.type::String = 'tool_use' AND block.name::String = 'Write' AND block.input.content::String != ''
    ) AS lines_added,
    sumIf(
        countSubstrings(block.input.old_string::String, char(10)) + 1,
        block.type::String = 'tool_use' AND block.name::String = 'Edit' AND block.input.old_string::String != ''
    ) AS lines_removed
FROM claude_code.raw
ARRAY JOIN data.message.content::Array(JSON) AS block
WHERE data.type::String = 'assistant'
    AND dynamicType(data.message.content) LIKE 'Array%'
    AND block.type::String = 'tool_use'
    AND block.name::String IN ('Edit', 'Write')
GROUP BY session_id`;
    return await queryClickHouse(sql);
}

async function loadClassifications() {
    const sql = `SELECT data.session_id::String AS session_id, data.remarkable::Bool AS remarkable, data.remarkable_reason::String AS remarkable_reason, data.user_corrected_agent::Bool AS user_corrected_agent, data.correction_detail::String AS correction_detail, data.agent_was_right::Bool AS agent_was_right, data.agent_right_detail::String AS agent_right_detail, data.sensitive_info::Bool AS sensitive_info, data.sensitive_detail::String AS sensitive_detail FROM claude_code.classification`;
    return await queryClickHouse(sql);
}

// --- Session List ---
async function loadSessions() {
    const loading = document.getElementById('list-loading');
    const errEl = document.getElementById('list-error');
    loading.classList.remove('hidden');
    errEl.classList.add('hidden');
    try {
        const sql = `SELECT
    data.sessionId::String AS session_id,
    replaceAll(replaceRegexpOne(path, '.*/projects/([^/]+)/.*', '\\\\1'), '-', '/') AS project,
    min(parseDateTime64BestEffortOrNull(data.timestamp::String)) AS started,
    max(parseDateTime64BestEffortOrNull(data.timestamp::String)) AS ended,
    dateDiff('second', started, ended) AS total_duration_sec,
    countIf(data.type::String = 'user'
        AND dynamicType(data.message.content) = 'String'
        AND data.isMeta::Bool = false
        AND NOT data.message.content::String LIKE 'Implement the following plan:%'
        AND NOT data.message.content::String LIKE '[Request interrupted by user%'
        AND NOT data.message.content::String LIKE '%This session is being continued from a previous conversation%'
        AND NOT data.message.content::String LIKE '%<task-notification>%'
    ) AS user_msgs,
    countIf(data.type::String = 'assistant') AS assistant_msgs,
    countIf(data.type::String = 'user') + countIf(data.type::String = 'assistant') AS all_msgs,
    sum(data.message.usage.input_tokens::UInt64) AS input_tokens,
    sum(data.message.usage.output_tokens::UInt64) AS output_tokens,
    sum(data.message.usage.cache_read_input_tokens::UInt64) AS cache_read_tokens,
    sum(data.message.usage.cache_creation_input_tokens::UInt64) AS cache_creation_tokens,
    sumIf(data.durationMs::UInt32, data.type::String = 'system' AND data.subtype::String = 'turn_duration') AS api_duration_ms,
    anyIf(data.summary::String, data.type::String = 'summary' AND data.summary::String != '') AS summary,
    anyIf(data.message.model::String, data.type::String = 'assistant' AND data.message.model::String NOT IN ('', '<synthetic>')) AS model,
    anyIf(data.gitBranch::String, data.gitBranch::String != '') AS git_branch,
    argMinIf(
        multiIf(
            dynamicType(data.message.content) = 'String', data.message.content::String,
            dynamicType(data.message.content) LIKE 'Array%', toJSONString(data.message.content::Array(JSON)),
            ''
        ),
        parseDateTime64BestEffortOrNull(data.timestamp::String),
        data.type::String = 'user' AND data.parentUuid::String = ''
    ) AS first_question,
    countIf(data.type::String = 'assistant' AND dynamicType(data.message.content) LIKE 'Array%' AND arrayExists(x -> x.name::String = 'EnterPlanMode', data.message.content::Array(JSON))) AS plan_count,
    countIf(data.type::String = 'system' AND data.subtype::String IN ('compact_boundary', 'microcompact_boundary')) AS compaction_count,
    countIf(data.type::String = 'user' AND dynamicType(data.message.content) LIKE 'Array%' AND arrayExists(x -> x.type::String = 'tool_result' AND (x.is_error::Bool = false OR dynamicType(x.is_error) = 'None'), data.message.content::Array(JSON))) AS approved_count,
    countIf(data.type::String = 'user' AND dynamicType(data.message.content) LIKE 'Array%' AND arrayExists(x -> x.type::String = 'tool_result' AND x.is_error::Bool = true AND x.content::String LIKE '%tool use was rejected%', data.message.content::Array(JSON))) AS rejected_count
FROM claude_code.raw
WHERE path NOT LIKE '%history.jsonl'
GROUP BY session_id, project
HAVING user_msgs > 0
ORDER BY started DESC`;
        const [sessionRows, lineRows, classRows] = await Promise.all([
            queryClickHouse(sql),
            loadLineStats().catch(() => []),
            loadClassifications().catch(() => [])
        ]);
        sessions = sessionRows;
        const lineMap = new Map(lineRows.map(r => [r.session_id, r]));
        const classMap = new Map(classRows.map(r => [r.session_id, r]));
        sessions.forEach(s => {
            s.cost = computeCost(s);
            s.total_tokens = (Number(s.input_tokens) || 0) + (Number(s.output_tokens) || 0) + (Number(s.cache_read_tokens) || 0) + (Number(s.cache_creation_tokens) || 0);
            const ls = lineMap.get(s.session_id);
            s.lines_added = ls ? Number(ls.lines_added) || 0 : 0;
            s.lines_removed = ls ? Number(ls.lines_removed) || 0 : 0;
            const cl = classMap.get(s.session_id);
            const toBool = v => v === true || v === 1 || v === '1' || v === 'true';
            s.remarkable = cl && toBool(cl.remarkable);
            s.remarkable_reason = cl ? cl.remarkable_reason || '' : '';
            s.user_corrected = cl && toBool(cl.user_corrected_agent);
            s.correction_detail = cl ? cl.correction_detail || '' : '';
            s.agent_right = cl && toBool(cl.agent_was_right);
            s.agent_right_detail = cl ? cl.agent_right_detail || '' : '';
            s.sensitive = cl && toBool(cl.sensitive_info);
            s.sensitive_detail = cl ? cl.sensitive_detail || '' : '';
        });
        mergePlanSessions();
        loading.classList.add('hidden');
        renderSessionList();
        updateStats();
    } catch (e) {
        loading.classList.add('hidden');
        errEl.textContent = e.message;
        errEl.classList.remove('hidden');
    }
}

function updateStats() {
    const bar = document.getElementById('stats-bar');
    const total = sessions.length;
    const totalCost = sessions.reduce((s, r) => s + r.cost, 0);
    const totalTokens = sessions.reduce((s, r) => s + (r.total_tokens || 0), 0);
    bar.innerHTML = `
        <span><span class="value">${total}</span> sessions</span>
        <span><span class="value">${formatNumber(totalTokens)}</span> tokens</span>
        <span><span class="value">${formatCost(totalCost)}</span> total cost</span>
    `;
}

function getFilteredSessions() {
    let list = sessions;
    if (fullTextSessionIds) {
        list = list.filter(s => fullTextSessionIds.has(s.session_id));
    }
    return list;
}

function sortByRelevance(list) {
    if (!fullTextSessionIds) return list;
    return [...list].sort((a, b) => {
        const ra = fullTextSessionIds.get(a.session_id) || 99;
        const rb = fullTextSessionIds.get(b.session_id) || 99;
        return ra - rb;
    });
}

function classificationRank(s) {
    if (s.agent_right) return 0;
    if (s.user_corrected) return 1;
    if (s.remarkable) return 2;
    return 3;
}

function sortSessions(list) {
    const dir = sortDir === 'asc' ? 1 : -1;
    const col = sortCol;
    const useDefaultSort = col === 'started' && sortDir === 'desc';
    return [...list].sort((a, b) => {
        if (useDefaultSort) {
            const ca = classificationRank(a), cb = classificationRank(b);
            if (ca !== cb) return ca - cb;
        }
        let va, vb;
        if (col === 'summary') {
            va = getSummaryText(a).toLowerCase();
            vb = getSummaryText(b).toLowerCase();
        } else if (col === 'cost') {
            va = a.cost; vb = b.cost;
        } else {
            va = a[col]; vb = b[col];
        }
        // Numeric comparison
        const na = Number(va), nb = Number(vb);
        if (!isNaN(na) && !isNaN(nb)) return (na - nb) * dir;
        // String comparison
        if (typeof va === 'string' && typeof vb === 'string') return va.localeCompare(vb) * dir;
        return 0;
    });
}

function renderSessionList() {
    const tbody = document.getElementById('session-tbody');
    const filtered = (fullTextSessionIds && !sortByUser) ? sortByRelevance(getFilteredSessions()) : sortSessions(getFilteredSessions());

    // Update header classes
    document.querySelectorAll('#session-table thead th').forEach(th => {
        th.classList.remove('sorted-asc', 'sorted-desc');
        if (th.dataset.col === sortCol) {
            th.classList.add(sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
        }
    });

    if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="15" class="empty-state">No sessions found</td></tr>`;
        return;
    }

    // Compute max values for bar rendering
    const barCols = {
        total_duration_sec: s => Number(s.total_duration_sec) || 0,
        api_duration_ms: s => Number(s.api_duration_ms) || 0,
        user_msgs: s => Number(s.user_msgs) || 0,
        all_msgs: s => Number(s.all_msgs) || 0,
        total_tokens: s => Number(s.total_tokens) || 0,
        cost: s => s.cost || 0,
        approved_count: s => Number(s.approved_count) || 0,
        rejected_count: s => Number(s.rejected_count) || 0,
        plan_count: s => Number(s.plan_count) || 0,
        compaction_count: s => Number(s.compaction_count) || 0,
        lines: s => (Number(s.lines_added) || 0) + (Number(s.lines_removed) || 0),
    };
    const maxVals = {};
    for (const [k, fn] of Object.entries(barCols)) {
        maxVals[k] = Math.max(...filtered.map(fn), 1);
    }
    function bar(col, val) {
        if (!val) return '';
        const pct = Math.round(Math.sqrt(val / maxVals[col]) * 100);
        if (pct < 1) return '';
        return `background:linear-gradient(to right, rgba(124,156,255,0.12) ${pct}%, transparent ${pct}%)`;
    }

    tbody.innerHTML = filtered.map(s => {
        const inTok = Number(s.input_tokens) || 0;
        const outTok = Number(s.output_tokens) || 0;
        const cacheRead = Number(s.cache_read_tokens) || 0;
        const cacheCreate = Number(s.cache_creation_tokens) || 0;
        const line1 = [];
        if (inTok) line1.push(`\u2193${formatNumber(inTok)}`);
        if (outTok) line1.push(`\u2191${formatNumber(outTok)}`);
        const line2 = [];
        if (cacheRead) line2.push(`\u21CA${formatNumber(cacheRead)}`);
        if (cacheCreate) line2.push(`\u21C8${formatNumber(cacheCreate)}`);
        const tokensDisplay = line1.join(' ') + (line2.length ? '<br><span style="color:var(--text-dim)">' + line2.join(' ') + '</span>' : '');
        const linesTotal = (Number(s.lines_added) || 0) + (Number(s.lines_removed) || 0);
        return `
        <tr data-session="${escapeHtml(s.session_id)}">
            <td><div class="col-summary-inner" title="${escapeHtml(getSummaryText(s))}">${escapeHtml(getSummaryText(s))}</div></td>
            <td class="col-tags">${(s.remarkable ? `<span title="${escapeHtml(s.remarkable_reason)}">\u2B50</span>` : '') + (s.sensitive ? `<span title="${escapeHtml(s.sensitive_detail)}">\u26A0\uFE0F</span>` : '') + (s.user_corrected ? `<span title="${escapeHtml(s.correction_detail)}">\u270A</span>` : '') + (s.agent_right ? `<span title="${escapeHtml(s.agent_right_detail)}">\uD83D\uDD25</span>` : '')}</td>
            <td class="col-time">${formatTime(s.started)}</td>
            <td class="col-duration align-right" style="${bar('total_duration_sec', Number(s.total_duration_sec) || 0)}">${formatDuration(s.total_duration_sec)}</td>
            <td class="col-duration align-right" style="${bar('api_duration_ms', Number(s.api_duration_ms) || 0)}">${formatMs(s.api_duration_ms)}</td>
            <td class="col-number align-right" style="${bar('user_msgs', Number(s.user_msgs) || 0)}">${s.user_msgs}</td>
            <td class="col-number align-right" style="${bar('all_msgs', Number(s.all_msgs) || 0)}">${s.all_msgs}</td>
            <td class="col-number align-right" style="${bar('total_tokens', Number(s.total_tokens) || 0)}">${tokensDisplay}</td>
            <td class="col-cost" style="${bar('cost', s.cost || 0)}">${formatCost(s.cost)}</td>
            <td class="col-number align-right" style="${bar('approved_count', Number(s.approved_count) || 0)}">${Number(s.approved_count) || ''}</td>
            <td class="col-number align-right" style="${bar('rejected_count', Number(s.rejected_count) || 0)}">${Number(s.rejected_count) || ''}</td>
            <td class="col-number align-right" style="${bar('plan_count', Number(s.plan_count) || 0)}">${Number(s.plan_count) || ''}</td>
            <td class="col-number align-right" style="${bar('compaction_count', Number(s.compaction_count) || 0)}">${Number(s.compaction_count) || ''}</td>
            <td class="col-number align-right" style="${bar('lines', linesTotal)}">${s.lines_added || s.lines_removed ? `<span style="color:var(--green)">+${formatNumber(s.lines_added)}</span> <span style="color:var(--red)">\u2212${formatNumber(s.lines_removed)}</span>` : ''}</td>
            <td class="col-model">${escapeHtml(shortModel(s.model))}</td>
        </tr>`;
    }).join('');
}

async function fullTextSearch(query) {
    if (searchAbort) searchAbort.abort();
    const controller = new AbortController();
    searchAbort = controller;
    const escaped = query.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    try {
        const sql = `SELECT
    data.sessionId::String AS session_id,
    min(multiIf(
        data.type::String = 'user' AND data.isMeta::Bool = false
            AND dynamicType(data.message.content) = 'String'
            AND data.message.content::String ILIKE '%${escaped}%', 1,
        data.type::String = 'assistant'
            AND toString(data.message.content) NOT LIKE '%"type":"thinking"%'
            AND toString(data.message.content) ILIKE '%${escaped}%', 2,
        data.type::String = 'assistant'
            AND toString(data.message.content) ILIKE '%${escaped}%', 3,
        4
    )) AS relevance
FROM claude_code.raw
WHERE toString(data.message.content) ILIKE '%${escaped}%'
   OR data.toolUseResult.content::String ILIKE '%${escaped}%'
   OR data.toolUseResult.stdout::String ILIKE '%${escaped}%'
   OR data.toolUseResult.stderr::String ILIKE '%${escaped}%'
   OR data.summary::String ILIKE '%${escaped}%'
GROUP BY session_id`;
        const resp = await fetch(CH_URL, {
            method: 'POST',
            headers: chHeaders(),
            body: sql + ' FORMAT JSON',
            signal: controller.signal,
        });
        if (!resp.ok) throw new Error(await resp.text());
        const json = await resp.json();
        const rows = json.data || [];
        if (controller.signal.aborted) return;
        fullTextSessionIds = new Map(rows.map(r => [r.session_id, Number(r.relevance)]));
        renderSessionList();
    } catch (e) {
        if (e.name === 'AbortError') return;
        console.error('Full-text search failed:', e);
    }
}

// --- Transcript View ---
async function loadTranscript(sessionId) {
    const loading = document.getElementById('transcript-loading');
    const errEl = document.getElementById('transcript-error');
    const container = document.getElementById('messages-container');
    loading.classList.remove('hidden');
    errEl.classList.add('hidden');
    container.innerHTML = '';

    // Check if this session has a merged plan session
    const session = sessions.find(s => s.session_id === sessionId);
    const sessionIds = [sessionId];
    if (session && session._plan_session_id) sessionIds.push(session._plan_session_id);

    const inClause = sessionIds.map(id => "'" + id.replace(/'/g, "\\'") + "'").join(',');
    try {
        const sql = `SELECT
    data.sessionId::String AS sid,
    data.type::String AS type,
    parseDateTime64BestEffortOrNull(data.timestamp::String) AS ts,
    data.uuid::String AS uuid,
    data.parentUuid::String AS parent_uuid,
    data.message.role::String AS role,
    data.message.model::String AS model,
    multiIf(
        dynamicType(data.message.content) = 'String',
        concat('[{"type":"text","text":', toJSONString(data.message.content::String), '}]'),
        dynamicType(data.message.content) LIKE 'Array%',
        toJSONString(data.message.content::Array(JSON)),
        '[]'
    ) AS content,
    data.message.usage.input_tokens::UInt64 AS input_tokens,
    data.message.usage.output_tokens::UInt64 AS output_tokens,
    data.message.usage.cache_read_input_tokens::UInt64 AS cache_read_tokens,
    data.message.usage.cache_creation_input_tokens::UInt64 AS cache_creation_tokens,
    data.message.stop_reason::String AS stop_reason,
    data.durationMs::UInt32 AS duration_ms,
    data.subtype::String AS subtype,
    data.summary::String AS summary,
    data.gitBranch::String AS git_branch,
    data.isSidechain::Bool AS is_sidechain,
    data.isMeta::Bool AS is_meta,
    data.toolUseResult.content::String AS tool_result_content,
    data.toolUseResult.stdout::String AS tool_result_stdout,
    data.toolUseResult.stderr::String AS tool_result_stderr
FROM claude_code.raw
WHERE data.sessionId::String IN (${inClause})
ORDER BY ts`;
        transcriptData = await queryClickHouse(sql);
        loading.classList.add('hidden');
        renderTranscriptMeta(sessionId);
        renderTranscript();
    } catch (e) {
        loading.classList.add('hidden');
        errEl.textContent = e.message;
        errEl.classList.remove('hidden');
    }
}

function renderTranscriptMeta(sessionId) {
    const meta = document.getElementById('transcript-meta');
    const session = sessions.find(s => s.session_id === sessionId);
    if (!session) {
        meta.innerHTML = `<span><span class="label">Session </span><span class="val">${escapeHtml(sessionId.slice(0,8))}...</span></span>`;
        return;
    }
    meta.innerHTML = `
        <span><span class="label">Project: </span><span class="val">${escapeHtml(session.project)}</span></span>
        <span><span class="label">Started: </span><span class="val">${formatTime(session.started)}</span></span>
        <span><span class="label">Duration: </span><span class="val">${formatDuration(session.total_duration_sec)}</span></span>
        <span><span class="label">API time: </span><span class="val">${formatMs(session.api_duration_ms)}</span></span>
        <span><span class="label">Model: </span><span class="val">${escapeHtml(shortModel(session.model))}</span></span>
        <span><span class="label">Cost: </span><span class="val">${formatCost(session.cost)}</span></span>
        <span title="Input / Output / Cache read / Cache create tokens"><span class="val">\u2193${formatNumber(session.input_tokens)} \u2191${formatNumber(session.output_tokens)} \u21CA${formatNumber(session.cache_read_tokens)} \u21C8${formatNumber(session.cache_creation_tokens)}</span></span>
        ${session.git_branch ? `<span><span class="label">Branch: </span><span class="val">${escapeHtml(session.git_branch)}</span></span>` : ''}
    `;
}

function getFilters() {
    return {
        user: document.getElementById('filter-user').checked,
        assistant: document.getElementById('filter-assistant').checked,
        thinking: document.getElementById('filter-thinking').checked,
        tools: document.getElementById('filter-tools').checked,
        results: document.getElementById('filter-results').checked,
        agent: document.getElementById('filter-agent').checked,
        skill: document.getElementById('filter-skill').checked,
        plan: document.getElementById('filter-plan').checked,
        interrupt: document.getElementById('filter-interrupt').checked,
        continuation: document.getElementById('filter-continuation').checked,
    };
}

function parseContentBlocks(contentStr) {
    if (!contentStr || contentStr === '[]') return [];
    try {
        const parsed = JSON.parse(contentStr);
        if (Array.isArray(parsed)) return parsed;
        if (typeof parsed === 'string') return [{ type: 'text', text: parsed }];
    } catch (e) {}
    // Treat as plain text
    return [{ type: 'text', text: contentStr }];
}

function renderToolInput(input) {
    if (!input || typeof input !== 'object') return renderAnsi(String(input || ''));
    const lines = [];
    for (const [k, v] of Object.entries(input)) {
        const val = typeof v === 'string' ? v : JSON.stringify(v, null, 2);
        if (val.includes('\n') || val.length > 100) {
            lines.push(`${k}:\n${val}`);
        } else {
            lines.push(`${k}: ${val}`);
        }
    }
    return renderAnsi(lines.join('\n'));
}

function renderEditDiff(input) {
    const file = input.file_path || '';
    const oldStr = input.old_string || '';
    const newStr = input.new_string || '';
    const oldLines = oldStr ? oldStr.split('\n') : [];
    const newLines = newStr ? newStr.split('\n') : [];
    const removed = oldLines.length;
    const added = newLines.length;

    let html = `<span style="color:#888">${escapeHtml(file)}</span>`;
    html += `  <span style="color:#f44">-${removed}</span> <span style="color:#4f4">+${added}</span>\n`;
    for (const line of oldLines) {
        html += `<span style="color:#f44;opacity:0.8">- ${escapeHtml(line)}</span>\n`;
    }
    for (const line of newLines) {
        html += `<span style="color:#4f4;opacity:0.8">+ ${escapeHtml(line)}</span>\n`;
    }
    return html;
}

function renderWriteSummary(input) {
    const file = input.file_path || '';
    const content = input.content || '';
    const lines = content ? content.split('\n') : [];

    let html = `<span style="color:#888">${escapeHtml(file)}</span>`;
    html += `  <span style="color:#4f4">+${lines.length} lines</span>\n`;
    for (const line of lines) {
        html += `<span style="color:#4f4;opacity:0.8">+ ${escapeHtml(line)}</span>\n`;
    }
    return html;
}

function classifyMessage(msg) {
    const blocks = parseContentBlocks(msg.content);
    const isSidechain = msg.is_sidechain === true || msg.is_sidechain === 'true' || msg.is_sidechain === 1;

    if (msg.type === 'summary') return { category: 'summary', blocks, isSidechain };
    if (msg.type === 'system') return { category: 'skip', blocks, isSidechain };
    if (msg.type === 'progress') return { category: 'skip', blocks, isSidechain };
    if (msg.type !== 'user' && msg.type !== 'assistant') return { category: 'skip', blocks, isSidechain };

    if (msg.type === 'assistant') {
        // Count sub-block types
        let hasText = false, thinkingCount = 0, toolUseCount = 0;
        for (const b of blocks) {
            if (b.type === 'thinking' && b.thinking) thinkingCount++;
            else if (b.type === 'text' && b.text) hasText = true;
            else if (b.type === 'tool_use') toolUseCount++;
        }
        return { category: 'assistant', blocks, isSidechain, hasText, thinkingCount, toolUseCount };
    }

    // User message subtypes
    const isToolResult = blocks.length > 0 && blocks.every(b => b.type === 'tool_result');
    const textContent = blocks.filter(b => b.type === 'text').map(b => b.text || '').join('');
    const isAgentNotification = !isToolResult && /<task-notification>/.test(textContent);
    const isMeta = msg.is_meta === true || msg.is_meta === 'true' || msg.is_meta === 1;
    const isSkill = !isToolResult && !isAgentNotification && isMeta;
    const isPlan = !isToolResult && !isAgentNotification && !isSkill && textContent.startsWith('Implement the following plan:');
    const isInterrupt = !isToolResult && !isAgentNotification && !isSkill && !isPlan && /^\[Request interrupted by user/.test(textContent.trim());
    const isContinuation = !isToolResult && !isAgentNotification && !isSkill && !isPlan && !isInterrupt && /This session is being continued from a previous conversation/.test(textContent);

    let category = 'user';
    if (isToolResult) category = 'tool_result';
    else if (isAgentNotification) category = 'agent_notification';
    else if (isSkill) category = 'skill';
    else if (isPlan) category = 'plan';
    else if (isInterrupt) category = 'interrupt';
    else if (isContinuation) category = 'continuation';

    return { category, blocks, isSidechain, isToolResult, isAgentNotification, isSkill, isPlan, isInterrupt, isContinuation };
}

function countMessages(data) {
    const counts = { user: 0, assistant: 0, thinking: 0, tools: 0, results: 0, agent: 0, skill: 0, plan: 0, interrupt: 0, continuation: 0 };
    for (const msg of data) {
        const cl = classifyMessage(msg);
        if (cl.category === 'assistant') {
            if (cl.hasText) counts.assistant++;
            counts.thinking += cl.thinkingCount;
            counts.tools += cl.toolUseCount;
        } else if (cl.category === 'tool_result') counts.results++;
        else if (cl.category === 'user') counts.user++;
        else if (cl.category === 'agent_notification') counts.agent++;
        else if (cl.category === 'skill') counts.skill++;
        else if (cl.category === 'plan') counts.plan++;
        else if (cl.category === 'interrupt') counts.interrupt++;
        else if (cl.category === 'continuation') counts.continuation++;
    }
    return counts;
}

function updateFilterLabels(counts) {
    const labels = {
        'filter-user': ['User', counts.user],
        'filter-assistant': ['Agent', counts.assistant],
        'filter-thinking': ['Think', counts.thinking],
        'filter-tools': ['Tool calls', counts.tools],
        'filter-results': ['Tool res', counts.results],
        'filter-agent': ['Agent notif', counts.agent],
        'filter-skill': ['Skills', counts.skill],
        'filter-plan': ['Plans', counts.plan],
        'filter-interrupt': ['Interrupt', counts.interrupt],
        'filter-continuation': ['Cont\'s', counts.continuation],
    };
    for (const [id, [name, count]] of Object.entries(labels)) {
        const el = document.getElementById(id);
        if (el && el.parentElement) {
            el.parentElement.childNodes[1].textContent = ` ${name} (${count})`;
            el.disabled = count === 0;
        }
    }
}

function renderTranscript() {
    const container = document.getElementById('messages-container');
    if (!transcriptData || transcriptData.length === 0) {
        container.innerHTML = '<div style="color:#555;text-align:center;padding:60px 20px">No messages in this session</div>';
        return;
    }

    const counts = countMessages(transcriptData);
    updateFilterLabels(counts);
    buildCumulativeMetrics();
    lastScrollMetricsIdx = -1;

    const filters = getFilters();
    const html = [];

    function metaHtml(msg, isSidechain) {
        const parts = [];
        if (msg.model && msg.model !== '<synthetic>') parts.push(`<span class="meta-model">${escapeHtml(shortModel(msg.model))}</span>`);
        const inTok = Number(msg.input_tokens) || 0;
        const outTok = Number(msg.output_tokens) || 0;
        const cacheRead = Number(msg.cache_read_tokens) || 0;
        if (inTok || outTok) {
            const t = [];
            if (inTok) t.push(`\u2193${formatNumber(inTok)}`);
            if (cacheRead) t.push(`\u21CA${formatNumber(cacheRead)}`);
            if (outTok) t.push(`\u2191${formatNumber(outTok)}`);
            parts.push(`<span class="meta-tokens">${t.join(' ')}</span>`);
        }
        if (msg.ts) parts.push(`<span class="meta-time">${formatTime(msg.ts)}</span>`);
        if (isSidechain) parts.push(`<span class="meta-sidechain">[sidechain]</span>`);
        return parts.length ? `<span class="term-meta">${parts.join('')}</span>` : '';
    }

    function prependPrefix(prefix, body) {
        if (!prefix) return body;
        const tag = `<span class="term-prefix">${prefix} </span>`;
        // Inject prefix after all leading nested block-level opening tags
        const m = body.match(/^(\s*<(?:div|p|blockquote|ul|ol|li|h[1-6])[^>]*>)+/i);
        if (m) return body.slice(0, m[0].length) + tag + body.slice(m[0].length);
        return tag + body;
    }

    let currentMsgIdx = -1;
    function emit(type, prefix, body, msg, isSidechain, extraClass) {
        const cls = `term-block type-${type}${isSidechain ? ' sidechain' : ''}${extraClass ? ' ' + extraClass : ''}`;
        const meta = metaHtml(msg, isSidechain);
        const metaLine = meta ? `<div class="term-meta-line">${meta}</div>` : '';
        const navAttr = (type === 'user' || type === 'assistant') ? ` data-nav="${type}"` : '';
        const navFooter = navAttr ? `<div class="term-nav"><span class="nav-prev" data-dir="prev">\u25B2 prev</span><span class="nav-next" data-dir="next">\u25BC next</span></div>` : '';
        html.push(`<div class="${cls}"${navAttr} data-msg-idx="${currentMsgIdx}">${metaLine}<div class="term-content">${prependPrefix(prefix, body)}</div>${navFooter}</div>`);
    }

    function renderMd(text) {
        if (ANSI_RE.test(text)) return `<div style="white-space:pre-wrap">${renderAnsi(text)}</div>`;
        return `<div class="term-md">${marked.parse(text)}</div>`;
    }

    function renderToolResult(block) {
        const text = typeof block.content === 'string' ? block.content :
            Array.isArray(block.content) ? block.content.map(c => c.text || '').join('\n') :
            JSON.stringify(block.content);
        return `<div style="white-space:pre-wrap">${renderAnsi(text)}</div>`;
    }

    for (let mi = 0; mi < transcriptData.length; mi++) {
        const msg = transcriptData[mi];
        currentMsgIdx = mi;
        const cl = classifyMessage(msg);
        const isSidechain = cl.isSidechain;

        if (cl.category === 'skip') continue;

        // Summary
        if (cl.category === 'summary' && msg.summary) {
            emit('summary', '\u2588 Summary', escapeHtml(msg.summary), msg, isSidechain);
            continue;
        }

        const validCategories = ['user','assistant','tool_result','agent_notification','skill','plan','interrupt','continuation'];
        if (!validCategories.includes(cl.category)) continue;

        // Apply filters
        if (cl.category === 'tool_result' && !filters.results) continue;
        if (cl.category === 'agent_notification' && !filters.agent) continue;
        if (cl.category === 'skill' && !filters.skill) continue;
        if (cl.category === 'plan' && !filters.plan) continue;
        if (cl.category === 'interrupt' && !filters.interrupt) continue;
        if (cl.category === 'continuation' && !filters.continuation) continue;
        if (cl.category === 'user' && !filters.user) continue;

        const blocks = cl.blocks;

        // Assistant: emit each sub-block separately
        if (msg.type === 'assistant') {
            let textParts = [];
            function flushText() {
                if (!textParts.length || !filters.assistant) return;
                const joined = textParts.join('');
                textParts = [];
                if (!joined.replace(/<[^>]*>/g, '').trim()) return;
                emit('assistant', '\u25CF', joined, msg, isSidechain);
            }
            for (const block of blocks) {
                if (block.type === 'thinking' && block.thinking) {
                    flushText();
                    if (!filters.thinking) continue;
                    emit('thinking', '\u{1F4AD}', `<div style="white-space:pre-wrap">${escapeHtml(block.thinking)}</div>`, msg, isSidechain);
                } else if (block.type === 'text' && block.text && block.text.trim()) {
                    textParts.push(renderMd(block.text));
                } else if (block.type === 'tool_use') {
                    flushText();
                    if (!filters.tools) continue;
                    const toolName = block.name || 'tool';
                    let toolBody;
                    if (toolName === 'Edit' && block.input) {
                        toolBody = `<div style="white-space:pre-wrap">${renderEditDiff(block.input)}</div>`;
                    } else if (toolName === 'Write' && block.input) {
                        toolBody = `<div style="white-space:pre-wrap">${renderWriteSummary(block.input)}</div>`;
                    } else {
                        toolBody = `<div style="white-space:pre-wrap">${renderToolInput(block.input)}</div>`;
                    }
                    emit('tool_use', `\u25CF ${escapeHtml(toolName)}`, toolBody, msg, isSidechain);
                }
            }
            flushText();
            continue;
        }

        // User messages and subtypes
        const prefixMap = {
            user:               '<img src="data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 48 48\'%3E%3Ccircle cx=\'24\' cy=\'24\' r=\'24\' fill=\'%236b7280\'/%3E%3Ccircle cx=\'24\' cy=\'18\' r=\'8\' fill=\'%23d1d5db\'/%3E%3Cpath d=\'M8 42c0-8.837 7.163-16 16-16s16 7.163 16 16\' fill=\'%23d1d5db\'/%3E%3C/svg%3E" class="user-icon">',
            tool_result:        '',
            agent_notification: '\u25CB agent',
            skill:              '\u25CB skill',
            plan:               '\u25CB plan',
            interrupt:          '\u2716',
            continuation:       '\u2026',
        };
        const prefix = prefixMap[cl.category] || '';

        let bodyHtml = '';
        for (const block of blocks) {
            if (block.type === 'text' && block.text) {
                bodyHtml += renderMd(block.text);
            } else if (block.type === 'tool_result') {
                if (!filters.results) continue;
                bodyHtml += renderToolResult(block);
            }
        }

        if (msg.type === 'user' && (msg.tool_result_content || msg.tool_result_stdout || msg.tool_result_stderr)) {
            if (filters.results) {
                const parts = [msg.tool_result_content, msg.tool_result_stdout, msg.tool_result_stderr].filter(Boolean);
                if (parts.length && !bodyHtml) {
                    bodyHtml += `<div style="white-space:pre-wrap">${renderAnsi(parts.join('\n'))}</div>`;
                }
            }
        }

        if (!bodyHtml.trim()) continue;

        emit(cl.category, prefix, bodyHtml, msg, isSidechain);
    }

    container.innerHTML = html.join('') || '<div style="color:#555;text-align:center;padding:60px 20px">No visible messages (adjust filters)</div>';
    updateStickyOffset();
    updateScrollMetrics();

    // Hide prev on first and next on last for each nav group
    for (const group of ['user', 'assistant']) {
        const blocks = container.querySelectorAll(`[data-nav="${group}"]`);
        if (blocks.length > 0) {
            const firstNav = blocks[0].querySelector('.nav-prev');
            const lastNav = blocks[blocks.length - 1].querySelector('.nav-next');
            if (firstNav) firstNav.classList.add('hidden');
            if (lastNav) lastNav.classList.add('hidden');
        }
    }

    // Re-apply transcript search if active
    const searchQuery = document.getElementById('transcript-search-input').value.trim();
    if (searchQuery.length >= 2) doTranscriptSearch(searchQuery);
}

function updateStickyOffset() {
    const bar = document.getElementById('filters-bar');
    if (bar) {
        const h = bar.offsetHeight + 'px';
        document.getElementById('messages-container').style.setProperty('--filters-height', h);
        document.getElementById('sticky-prompt').style.setProperty('--filters-height', h);
    }
}

// Filter toggles
document.getElementById('filter-all').addEventListener('change', e => {
    const checked = e.target.checked;
    document.querySelectorAll('#filters-bar input[type="checkbox"]:not(#filter-all)').forEach(cb => cb.checked = checked);
    renderTranscript();
});
document.getElementById('filters-bar').addEventListener('change', e => {
    if (e.target.id !== 'filter-all') renderTranscript();
});

// Transcript search
let transcriptSearchHits = [];
let transcriptSearchIdx = -1;

function clearTranscriptSearch() {
    document.querySelectorAll('mark.search-hit').forEach(m => {
        const parent = m.parentNode;
        parent.replaceChild(document.createTextNode(m.textContent), m);
        parent.normalize();
    });
    transcriptSearchHits = [];
    transcriptSearchIdx = -1;
    document.getElementById('transcript-search-count').textContent = '';
    document.querySelector('.transcript-search').classList.remove('active');
}

function doTranscriptSearch(query) {
    clearTranscriptSearch();
    if (!query || query.length < 2) return;
    document.querySelector('.transcript-search').classList.add('active');

    const container = document.getElementById('messages-container');
    const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
    const matches = [];
    const lcQuery = query.toLowerCase();

    // Collect all text nodes with matches
    while (walker.nextNode()) {
        const node = walker.currentNode;
        if (node.parentElement.closest('.term-meta-line, .term-nav, .term-prefix')) continue;
        const text = node.textContent.toLowerCase();
        if (text.includes(lcQuery)) matches.push(node);
    }

    // Wrap matches in <mark> tags
    for (const node of matches) {
        const text = node.textContent;
        const frag = document.createDocumentFragment();
        let lastIdx = 0;
        const lcText = text.toLowerCase();
        let pos;
        while ((pos = lcText.indexOf(lcQuery, lastIdx)) !== -1) {
            if (pos > lastIdx) frag.appendChild(document.createTextNode(text.slice(lastIdx, pos)));
            const mark = document.createElement('mark');
            mark.className = 'search-hit';
            mark.textContent = text.slice(pos, pos + query.length);
            frag.appendChild(mark);
            lastIdx = pos + query.length;
        }
        if (lastIdx < text.length) frag.appendChild(document.createTextNode(text.slice(lastIdx)));
        node.parentNode.replaceChild(frag, node);
    }

    transcriptSearchHits = [...container.querySelectorAll('mark.search-hit')];
    const countEl = document.getElementById('transcript-search-count');
    if (transcriptSearchHits.length > 0) {
        transcriptSearchIdx = 0;
        highlightCurrentHit();
        countEl.textContent = `1/${transcriptSearchHits.length}`;
    } else {
        countEl.textContent = query.length >= 2 ? '0' : '';
    }
}

function highlightCurrentHit() {
    transcriptSearchHits.forEach((m, i) => m.classList.toggle('current', i === transcriptSearchIdx));
    if (transcriptSearchHits[transcriptSearchIdx]) {
        const hit = transcriptSearchHits[transcriptSearchIdx];
        // Expand collapsed block if needed
        const content = hit.closest('.term-content');
        if (content && !content.classList.contains('expanded')) content.classList.add('expanded');
        const filtersH = document.getElementById('filters-bar')?.offsetHeight || 36;
        const stickyH = document.getElementById('sticky-prompt')?.offsetHeight || 0;
        const top = hit.getBoundingClientRect().top + window.scrollY - filtersH - stickyH - 40;
        window.scrollTo({ top, behavior: 'smooth' });
    }
}

function navigateTranscriptSearch(dir) {
    if (!transcriptSearchHits.length) return;
    transcriptSearchIdx = (transcriptSearchIdx + dir + transcriptSearchHits.length) % transcriptSearchHits.length;
    highlightCurrentHit();
    document.getElementById('transcript-search-count').textContent = `${transcriptSearchIdx + 1}/${transcriptSearchHits.length}`;
}

let transcriptSearchTimer = null;
document.getElementById('transcript-search-input').addEventListener('input', e => {
    clearTimeout(transcriptSearchTimer);
    transcriptSearchTimer = setTimeout(() => doTranscriptSearch(e.target.value.trim()), 200);
});
document.getElementById('transcript-search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        e.preventDefault();
        navigateTranscriptSearch(e.shiftKey ? -1 : 1);
    } else if (e.key === 'Escape') {
        e.target.value = '';
        clearTranscriptSearch();
    }
});
document.getElementById('transcript-search-prev').addEventListener('click', () => navigateTranscriptSearch(-1));
document.getElementById('transcript-search-next').addEventListener('click', () => navigateTranscriptSearch(1));

// Click to expand/collapse scrollable blocks, and prev/next navigation
document.getElementById('messages-container').addEventListener('click', e => {
    // Nav buttons
    const navBtn = e.target.closest('.nav-prev, .nav-next');
    if (navBtn) {
        const block = navBtn.closest('[data-nav]');
        if (!block) return;
        const group = block.dataset.nav;
        const all = [...document.querySelectorAll(`[data-nav="${group}"]`)];
        const idx = all.indexOf(block);
        const target = navBtn.classList.contains('nav-prev') ? all[idx - 1] : all[idx + 1];
        if (target) {
            const offset = parseInt(getComputedStyle(document.getElementById('messages-container')).getPropertyValue('--filters-height')) || 36;
            const top = target.offsetTop - offset;
            window.scrollTo({ top, behavior: 'smooth' });
        }
        return;
    }
    // Expand/collapse
    const block = e.target.closest('.type-user, .type-thinking, .type-tool_use, .type-tool_result');
    if (!block) return;
    const content = block.querySelector('.term-content');
    if (content) content.classList.toggle('expanded');
});

// Sticky user prompt
let stickyCurrentIdx = -1;
let stickyHeight = 60; // cached height estimate
function updateStickyPrompt() {
    const container = document.getElementById('messages-container');
    const sticky = document.getElementById('sticky-prompt');
    const blocks = container.querySelectorAll('[data-nav="user"]');
    if (!blocks.length) { sticky.style.display = 'none'; return; }

    const filtersBar = document.getElementById('filters-bar');
    const filtersH = filtersBar ? filtersBar.offsetHeight : 36;
    // All comparisons use offsetTop (document-relative, unaffected by fixed positioning)
    const scrollTop = window.scrollY + filtersH;

    // Find the last user block whose top has scrolled past
    let currentIdx = -1;
    for (let i = 0; i < blocks.length; i++) {
        if (blocks[i].offsetTop < scrollTop) currentIdx = i;
        else break;
    }

    // Don't show if no block has scrolled past, or current block bottom is still visible
    if (currentIdx < 0 || (blocks[currentIdx].offsetTop + blocks[currentIdx].offsetHeight) > scrollTop) {
        sticky.style.display = 'none';
        stickyCurrentIdx = -1;
        return;
    }

    // Hide sticky if the next user prompt would overlap with it
    const nextBlock = blocks[currentIdx + 1];
    if (nextBlock) {
        const stickyBottomY = scrollTop + stickyHeight;
        if (nextBlock.offsetTop <= stickyBottomY + 2) {
            sticky.style.display = 'none';
            stickyCurrentIdx = -1;
            return;
        }
    }

    if (currentIdx !== stickyCurrentIdx) {
        stickyCurrentIdx = currentIdx;
        sticky.innerHTML = blocks[currentIdx].innerHTML;
        // Update prev/next visibility
        const prev = sticky.querySelector('.nav-prev');
        const next = sticky.querySelector('.nav-next');
        if (prev) prev.classList.toggle('hidden', currentIdx === 0);
        if (next) next.classList.toggle('hidden', currentIdx === blocks.length - 1);
    }
    sticky.style.top = filtersH + 'px';
    sticky.style.display = 'block';
    // Cache actual height for next frame's overlap check
    stickyHeight = sticky.offsetHeight;
}

// Scroll metrics — cumulative stats line in the filters bar
let cumulativeMetrics = null; // Array indexed by transcriptData index

function buildCumulativeMetrics() {
    if (!transcriptData || !transcriptData.length) { cumulativeMetrics = null; return; }
    cumulativeMetrics = new Array(transcriptData.length);
    let time0 = null;
    let apiMs = 0, inTok = 0, outTok = 0, cacheRead = 0, cacheCreate = 0;
    let userPrompts = 0, assistantMsgs = 0, thoughts = 0, tools = 0, compactions = 0, plans = 0;
    for (let i = 0; i < transcriptData.length; i++) {
        const msg = transcriptData[i];
        const ts = msg.ts ? new Date(msg.ts.replace(' ', 'T')) : null;
        if (ts && !isNaN(ts) && !time0) time0 = ts;

        // API duration from turn_duration system messages
        if (msg.type === 'system' && msg.subtype === 'turn_duration') {
            apiMs += Number(msg.duration_ms) || 0;
        }
        // Compactions
        if (msg.type === 'system' && (msg.subtype === 'compact_boundary' || msg.subtype === 'microcompact_boundary')) {
            compactions++;
        }
        // Tokens (assistant messages)
        if (msg.type === 'assistant') {
            inTok += Number(msg.input_tokens) || 0;
            outTok += Number(msg.output_tokens) || 0;
            cacheRead += Number(msg.cache_read_tokens) || 0;
            cacheCreate += Number(msg.cache_creation_tokens) || 0;
            const cl = classifyMessage(msg);
            if (cl.hasText) assistantMsgs++;
            thoughts += cl.thinkingCount;
            tools += cl.toolUseCount;
        }
        // User prompts (real user messages)
        if (msg.type === 'user') {
            const cl = classifyMessage(msg);
            if (cl.category === 'user') userPrompts++;
            if (cl.category === 'plan') plans++;
        }

        const elapsed = (ts && time0) ? Math.round((ts - time0) / 1000) : 0;
        cumulativeMetrics[i] = { elapsed, apiMs, inTok, outTok, cacheRead, cacheCreate, userPrompts, assistantMsgs, thoughts, tools, compactions, plans };
    }
}

function computeCumulativeCost(m, sessionId) {
    const session = sessions.find(s => s.session_id === sessionId);
    const model = session ? session.model : '';
    const tier = detectPricingTier(model);
    const p = PRICING[tier];
    return (m.inTok * p.input + m.outTok * p.output + m.cacheRead * p.cache_read + m.cacheCreate * p.cache_creation) / 1_000_000;
}

let lastScrollMetricsIdx = -1;
function updateScrollMetrics() {
    const metricsEl = document.getElementById('scroll-metrics');
    if (!cumulativeMetrics || !transcriptData || window.scrollY < 10) { metricsEl.style.display = 'none'; return; }

    const container = document.getElementById('messages-container');
    const blocks = container.querySelectorAll('.term-block[data-msg-idx]');
    if (!blocks.length) { metricsEl.style.display = 'none'; return; }

    // Find the last block whose top is above the viewport bottom
    const viewBottom = window.scrollY + window.innerHeight;
    let lastIdx = -1;
    for (const block of blocks) {
        if (block.offsetTop <= viewBottom) {
            const mi = parseInt(block.dataset.msgIdx);
            if (mi > lastIdx) lastIdx = mi;
        }
    }

    if (lastIdx < 0 || lastIdx >= cumulativeMetrics.length) { metricsEl.style.display = 'none'; return; }
    if (lastIdx === lastScrollMetricsIdx) return;
    lastScrollMetricsIdx = lastIdx;

    const wasHidden = metricsEl.style.display === 'none';
    const m = cumulativeMetrics[lastIdx];
    const sessionId = window.location.hash.slice('#session/'.length);
    const cost = computeCumulativeCost(m, sessionId);

    metricsEl.style.display = 'flex';
    metricsEl.innerHTML =
        `<span>\u23F1 <span class="val">${formatDuration(m.elapsed)}</span></span>` +
        `<span class="val">${formatCost(cost)}</span>` +
        `<span>\u2193<span class="val">${formatNumber(m.inTok)}</span> \u2191<span class="val">${formatNumber(m.outTok)}</span> \u21CA<span class="val">${formatNumber(m.cacheRead)}</span> \u21C8<span class="val">${formatNumber(m.cacheCreate)}</span></span>` +
        `<span>User <span class="val">${m.userPrompts}</span></span>` +
        `<span>Agent <span class="val">${m.assistantMsgs}</span></span>` +
        `<span>Thoughts <span class="val">${m.thoughts}</span></span>` +
        `<span>Tools <span class="val">${m.tools}</span></span>` +
        (m.compactions ? `<span>Compactions <span class="val">${m.compactions}</span></span>` : '') +
        (m.plans ? `<span>Plans <span class="val">${m.plans}</span></span>` : '');

    if (wasHidden) updateStickyOffset();
}

window.addEventListener('scroll', () => { updateStickyPrompt(); updateScrollMetrics(); }, { passive: true });

// Click handler for sticky prompt
document.getElementById('sticky-prompt').addEventListener('click', e => {
    const navBtn = e.target.closest('.nav-prev, .nav-next');
    if (navBtn) {
        const blocks = [...document.querySelectorAll('[data-nav="user"]')];
        const target = navBtn.classList.contains('nav-prev') ? blocks[stickyCurrentIdx - 1] : blocks[stickyCurrentIdx + 1];
        if (target) {
            const offset = parseInt(getComputedStyle(document.getElementById('messages-container')).getPropertyValue('--filters-height')) || 36;
            const top = target.offsetTop - offset;
            window.scrollTo({ top, behavior: 'smooth' });
        }
        return;
    }
    const content = document.getElementById('sticky-prompt').querySelector('.term-content');
    if (content) content.classList.toggle('expanded');
});

// --- Navigation ---
function navigateTo(hash) {
    window.location.hash = hash;
}

function handleRoute() {
    const hash = window.location.hash.slice(1);
    const listView = document.getElementById('session-list-view');
    const transcriptView = document.getElementById('transcript-view');

    const header = document.querySelector('header');
    if (hash.startsWith('session/')) {
        const sessionId = hash.slice(8);
        listView.style.display = 'none';
        header.style.display = 'none';
        transcriptView.style.display = 'block';
        window.scrollTo(0, 0);
        loadTranscript(sessionId);
    } else {
        listView.style.display = 'block';
        header.style.display = '';
        transcriptView.style.display = 'none';
    }
}

window.addEventListener('hashchange', handleRoute);
window.addEventListener('resize', updateStickyOffset);
document.getElementById('back-btn').addEventListener('click', () => navigateTo(''));

// --- Init ---
loadSessions().then(() => handleRoute());
</script>
